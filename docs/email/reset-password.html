<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña - Excusas Jeans</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; margin: 0; padding: 20px;">
  <div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <div style="background: #2563eb; color: #fff; padding: 32px; text-align: center;">
      <h1 style="margin: 0; font-size: 24px;">Excusas Jeans</h1>
      <p style="margin: 8px 0 0; opacity: 0.9;">Restablecer contraseña</p>
    </div>
    <div style="padding: 32px; text-align: center;">
      <p style="color: #374151; line-height: 1.6;">
        Recibimos una solicitud para restablecer la contraseña de tu cuenta. Haz clic en el botón para elegir una nueva contraseña.
      </p>
      <a href="{{ .ResetURL }}" style="display: inline-block; margin: 24px 0; background: #2563eb; color: #fff; text-decoration: none; padding: 14px 28px; border-radius: 8px; font-weight: 600;">
        Restablecer contraseña
      </a>
      <p style="color: #6b7280; font-size: 14px;">Si no solicitaste este cambio, ignora este correo.</p>
      <p style="color: #9ca3af; font-size: 12px; word-break: break-all;">{{ .ResetURL }}</p>
    </div>
  </div>
</body>
</html>
