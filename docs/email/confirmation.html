<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirma tu cuenta — Excusas Jeans</title>
</head>
<body style="margin:0;padding:0;background-color:#f9fafb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f9fafb;">
    <tr>
      <td align="center" style="padding:44px 20px 52px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px;">
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <img
                src="https://excusasjeans.com/logo-excusas.png"
                alt="Excusas Jeans"
                width="56"
                height="56"
                style="display:block;width:56px;height:56px;border:0;margin:0 auto;"
              />
              <p style="margin:12px 0 0;font-size:24px;font-weight:700;color:#111827;letter-spacing:-0.02em;">
                Excusas <span style="font-weight:600;color:#4b5563;">Jeans</span>
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:14px;">
              <h1 style="margin:0;font-size:26px;font-weight:700;line-height:1.3;color:#111827;letter-spacing:-0.02em;">
                Confirma tu correo
              </h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <p style="margin:0;font-size:15px;line-height:1.6;color:#4b5563;max-width:380px;">
                Guarda tu carrito y completa tus datos de envío. Pulsa el botón para activar tu cuenta.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <a
                href="{{ link }}"
                style="display:inline-block;background-color:#047857;color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;padding:12px 32px;border-radius:6px;border-bottom:3px solid #065f46;"
              >
                Confirmar correo
              </a>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#9ca3af;">
                El enlace caduca en 24 horas. Si ya lo abriste, solicita un correo nuevo desde la tienda.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:36px;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#6b7280;">
                ¿No creaste una cuenta?
                <a href="{{ link }}" style="color:#047857;text-decoration:underline;font-weight:500;">Usa este enlace</a>
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="border-top:1px solid #e5e7eb;padding-top:24px;">
              <p style="margin:0;font-size:12px;color:#9ca3af;">excusasjeans.com</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
